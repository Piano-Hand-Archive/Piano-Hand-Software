<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Hand Project - Dashboard</title>
    <style>
        /* --- MODERN VARIABLES --- */
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-main: #111827;
            --border-color: #e5e7eb;
            --btn-bg: #007bff;
            --btn-hover: #0056b3;
            --accent: #39e5a8;
            --radius: 12px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 95%;
            max-width: 1600px;
        }

        h1 { text-align: center; margin-bottom: 2rem; font-weight: 800; }

        /* --- VISUALIZER ROW (TOP) --- */
        .visualizer-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 2rem;
            align-items: start;
        }

        .message-success { 
            background-color: #d1fae5; 
            color: #065f46; 
            border: 1px solid #10b981; 
            display: block;
        }

        .message-error { 
            background-color: #fee2e2; 
            color: #991b1b; 
            border: 1px solid #ef4444; 
            display: block;
        }

        .vis-card {
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
            background: #fff;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }

        .vis-card h2 {
            margin: 0;
            padding: 0.75rem 1rem;
            background: #f7f7f7;
            border-bottom: 1px solid var(--border-color);
            font-size: 1rem;
            color: #333;
        }

        .vis-card iframe {
            width: 100%;
            height: 600px;
            border: none;
            display: block;
        }

        /* --- OPTIONS ROW (BOTTOM) --- */
        .options-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr; /* Camera gets slightly more room */
            gap: 20px;
            align-items: start;
        }

        .option-card {
            background: #fff;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .option-card h2 {
            margin: 0 0 1rem 0;
            font-size: 1.1rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 0.5rem;
        }

        /* --- BUTTONS & INPUTS --- */
        button {
            display: block;
            width: 100%;
            padding: 0.75rem;
            border: none;
            background-color: var(--btn-bg);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--btn-hover); }

        select, input[type="file"] {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* --- CAMERA CONTAINER (3:4 Ratio Fix) --- */
        .camera-wrapper {
            position: relative;
            background-color: #000;
            width: 100%;
            aspect-ratio: 3 / 4; 
            overflow: hidden;
            border-radius: 6px;
            display: none; 
        }
        video {
            position: absolute;
            width: 133.33%; /* Compansating for 90deg rotation */
            height: 75%;    
            top: 12.5%;
            left: -16.66%;
            transform: rotate(90deg);
            object-fit: cover;
        }
        #canvas-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        /* --- RESPONSIVENESS --- */
        @media (max-width: 1100px) {
            .visualizer-row, .options-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Piano Hand Project</h1>
        <div id="message"></div>

        <div class="visualizer-row">
            <div id="embedded-visualizer" class="vis-card">
                <h2>AlphaTab Visualizer</h2>
                <iframe id="visualizer-frame" title="AlphaTab" allow="autoplay"></iframe>
            </div>

            <div id="piano-visualizer-section" class="vis-card">
                <h2>Piano Fingering Visualizer</h2>
                <iframe id="piano-frame" src="/piano_visualizer" allow="autoplay"></iframe>
            </div>
        </div>

        <div class="options-row">
            <div class="option-card">
                <h2>Option 1: Upload</h2>
                <form id="upload-image-form">
                    <input type="file" id="image_file" name="image_file" accept=".png,.jpg,.jpeg" required>
                    <button type="submit">Upload & Process</button>
                </form>
            </div>

            <div class="option-card">
                <h2>Option 2: Camera</h2>
                <div class="camera-wrapper">
                    <video id="video" autoplay></video>
                    <canvas id="canvas-overlay"></canvas>
                </div>
                <button id="snap">Start Capture</button>
                <canvas id="canvas" style="display:none;"></canvas>
            </div>

            <div class="option-card">
                <h2>Option 3: Library</h2>
                <form id="preloaded-form">
                    <select id="preloaded_file" name="preloaded_file">
                        <option value="" disabled selected>Select a file...</option>
                        {% for item in preloaded_items %}
                            <option value="{{ item.filename }}">{{ item.label }}</option>
                        {% endfor %}
                    </select>
                    <button type="submit">Load Song</button>
                </form>
            </div>
        </div>
    </div>

    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
